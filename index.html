<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VATP Presentations</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #faf8f4;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      max-width: 600px;
      padding: 48px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #2f5b4e;
    }
    p {
      color: #5a5a5a;
      margin-bottom: 32px;
    }
    a.card {
      display: block;
      background: #fff;
      border: 1px solid #e5e2dc;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: #1a1a1a;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    a.card:hover {
      border-color: #2f5b4e;
      box-shadow: 0 4px 16px rgba(47, 91, 78, 0.1);
    }
    a.card h2 {
      font-size: 1.2rem;
      margin-bottom: 4px;
      color: #2f5b4e;
    }
    a.card span {
      font-size: 0.9rem;
      color: #5a5a5a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VATP Presentations</h1>
    <p>Ventspils Augsto Tehnoloģiju Parks</p>
    <a class="card" href="vatp-hvac-ai-platforma/">
      <h2>VATP HVAC AI Platforma</h2>
      <span>IPCEI-CIS Programme &middot; February 2026 &middot; Prototype Phase</span>
    </a>
  </div>
</body>
</html>
